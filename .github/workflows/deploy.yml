name: Deploy GoodGame Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: goodgame-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Typecheck and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web worker
        run: pnpm --filter web exec tsc --noEmit

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --var BUILD_SHA:${{ github.sha }} --var BUILD_REF:${{ github.ref_name }} --var BUILD_TIME:${{ github.run_id }}
